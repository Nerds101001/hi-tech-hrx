name: Deploy to Hostinger

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip

      - name: Create Deployment Archive
        run: tar -czf deploy.tar.gz --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='vendor' --exclude='storage/*.log' --exclude='.env' .

      - name: Ensure Target Directory Exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p domains/hitechgroup.in/public_html/hrx

      - name: Upload Archive
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy.tar.gz"
          target: "domains/hitechgroup.in/public_html/hrx"

      - name: Extract and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd domains/hitechgroup.in/public_html/hrx
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            # Ensure storage directories exist with correct permissions
            mkdir -p storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
            chmod -R 775 storage bootstrap/cache
            
            # Run Laravel optimizations
            if [ -f "composer.json" ]; then
              composer install --no-dev --optimize-autoloader --no-interaction
            fi
            
            if [ -f "artisan" ]; then
              php artisan migrate --force
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
            fi
