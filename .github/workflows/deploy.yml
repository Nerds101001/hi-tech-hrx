name: Deploy to Hostinger

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip

      - name: Create Deployment Archive
        run: |
          echo "Creating archive in /tmp..."
          # Using /tmp ensures we are not archiving the file as it's being written
          tar -czf /tmp/deploy.tar.gz --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='vendor' --exclude='storage/*.log' --exclude='.env' .
          echo "Archive created at /tmp/deploy.tar.gz"

      - name: Prepare Server Environment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p /home/${{ secrets.SSH_USER }}/domains/hitechgroup.in/public_html/hrx
            echo "Environment prepared."

      - name: Upload Archive
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "/tmp/deploy.tar.gz"
          target: "/home/${{ secrets.SSH_USER }}/domains/hitechgroup.in/public_html/hrx"
          strip_components: 1
          debug: true

      - name: Extract and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Moving to target directory..."
            cd /home/${{ secrets.SSH_USER }}/domains/hitechgroup.in/public_html/hrx || { echo "Directory not found"; exit 1; }
            
            echo "Extracting archive..."
            if [ -f "deploy.tar.gz" ]; then
              tar -xzf deploy.tar.gz
              rm deploy.tar.gz
              echo "Extraction complete."
            else
              echo "Error: deploy.tar.gz not found in $(pwd)"
              ls -la
              exit 1
            fi
            
            echo "Setting up storage permissions..."
            mkdir -p storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
            chmod -R 775 storage bootstrap/cache
            
            echo "Checking environment file..."
            if [ ! -f ".env" ]; then
              echo "Warning: .env file missing. Creating from .env.example..."
              cp .env.example .env
              php artisan key:generate || echo "Key generation failed - likely PHP missing or path issue"
            fi
            
            echo "Running Composer..."
            export PATH=$PATH:/usr/local/bin:/usr/bin
            if [ -f "composer.json" ]; then
               # Attempt to find composer if it's not in PATH
               COMPOSER_BIN=$(which composer || find /usr -name composer -type f 2>/dev/null | head -n 1 || echo "composer")
               $COMPOSER_BIN install --no-dev --optimize-autoloader --no-interaction || echo "Composer install failed - continuing..."
            fi
            
            echo "Running Artisan migrations..."
            if [ -f "artisan" ]; then
              php artisan migrate --force --no-interaction || echo "Migrations failed - likely database not configured in .env"
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan storage:link || true
            fi
            echo "Final check of directory contents:"
            ls -F
            echo "Deployment step finished."
