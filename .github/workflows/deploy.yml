name: Deploy to Hostinger

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip

      - name: Create Deployment Archive
        run: |
          echo "Creating archive..."
          tar -czf deploy.tar.gz --exclude='deploy.tar.gz' --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='vendor' --exclude='storage/*.log' --exclude='.env' .
          echo "Archive created: $(ls -lh deploy.tar.gz)"

      - name: Prepare Server Environment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Current Directory: $(pwd)"
            echo "Target Directory: /home/${{ secrets.SSH_USER }}/domains/hitechgroup.in/public_html/hrx"
            mkdir -p /home/${{ secrets.SSH_USER }}/domains/hitechgroup.in/public_html/hrx
            echo "Environment prepared."

      - name: Upload Archive
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy.tar.gz"
          target: "/home/${{ secrets.SSH_USER }}/domains/hitechgroup.in/public_html/hrx"
          debug: true

      - name: Extract and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/${{ secrets.SSH_USER }}/domains/hitechgroup.in/public_html/hrx
            echo "Extracting archive..."
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            echo "Setting up directories..."
            mkdir -p storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
            chmod -R 775 storage bootstrap/cache
            
            echo "Running Laravel commands..."
            if [ -f "composer.json" ]; then
              composer install --no-dev --optimize-autoloader --no-interaction
            fi
            
            if [ -f "artisan" ]; then
              php artisan migrate --force --no-interaction
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan storage:link || true
            fi
            echo "Deployment complete."
