name: Deploy to Hostinger

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip

      - name: Create Deployment Package
        run: |
          echo "Packaging application..."
          # We archive the current directory but exclude the archive file itself and other unnecessary items
          tar -czf deployment.tar.gz --exclude='deployment.tar.gz' --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='vendor' --exclude='.env' .
          echo "Package created."

      - name: Prepare Hostinger Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Initializing target directory..."
            mkdir -p /home/${{ secrets.SSH_USER }}/domains/hitechgroup.in/public_html/hrx
            echo "Directory ready."

      - name: Transfer Package to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "deployment.tar.gz"
          target: "/home/${{ secrets.SSH_USER }}/domains/hitechgroup.in/public_html/hrx"

      - name: Extract and Run Deploy Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/${{ secrets.SSH_USER }}/domains/hitechgroup.in/public_html/hrx
            
            echo "Unpacking files..."
            if [ -f "deployment.tar.gz" ]
            then
              tar -xzf deployment.tar.gz
              rm deployment.tar.gz
            else
              echo "Error: deployment.tar.gz missing on server."
              exit 1
            fi
            
            echo "Securing storage directories..."
            mkdir -p storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
            chmod -R 775 storage bootstrap/cache
            
            echo "Completing Laravel setup..."
            # Check for existing .env, create if missing
            if [ ! -f ".env" ]
            then
              cp .env.example .env
              php artisan key:generate
            fi
            
            # Run optimizations but allow them to fail if DB is not configured yet
            composer install --no-dev --optimize-autoloader --no-interaction || echo "Composer failed - skipping."
            php artisan migrate --force --no-interaction || echo "Migrations failed - likely DB not ready."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link || true
            
            echo "Deployment finished successfully."
